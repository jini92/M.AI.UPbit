name: Weekly Newsletter Generator

on:
  schedule:
    - cron: '0 22 * * 0'   # 매주 월요일 07:00 KST
  workflow_dispatch:

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install maiupbit
      - name: Generate KR + EN newsletters
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
        run: python scripts/generate_newsletter.py
      - name: Update README badges
        run: python scripts/ci_weekly_report.py > /tmp/report.json && python scripts/update_readme_badges.py /tmp/report.json
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "maiupbit-bot"
          git add blog/drafts/ README.md
          git diff --staged --quiet || git commit -m "chore: weekly newsletter $(date +%Y-%m-%d) [KR+EN]"
          git push
